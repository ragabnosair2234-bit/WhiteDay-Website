<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Day - Wedding Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">

    <style>
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="flex min-h-screen h-[100vh]">
        <div class="hidden md:block w-1/2 relative">
            <img src="../img/signup-img.jpg" class="w-full h-full object-cover" alt="Couple">
        </div>
        <div class="w-full md:w-1/2 flex flex-col items-center justify-center p-4 md:p-8 bg-[#F5ECDF] overflow-hidden">
            <img src="../img/logo.png" class="mb-4 md:mb-6 logo" >
            <div class="w-full max-w-[95%] space-y-4 form">
                <div class="custom-input-group mt-4 md:mt-6">
                    <input type="text" placeholder="Full Name" class="custom-input">
                    <i class="far fa-user custom-input-icon"></i>
                </div>
                <div class="custom-input-group mt-4 md:mt-6">
                    <input type="email" placeholder="Email" class="custom-input">
                    <i class="far fa-envelope custom-input-icon"></i>
                </div>
                <div class="custom-input-group mt-4 md:mt-6">
                    <input type="phone" placeholder="Phone" class="custom-input">
                    <i class="fa-solid fa-phone custom-input-icon"></i>
                </div>
                <div class="custom-input-group mt-4 md:mt-6">
                    <input type="password" placeholder="Password" class="custom-input">
                    <i class="fas fa-lock custom-input-icon"></i>
                </div>
                <div id="signup-error" class="text-red-600 text-center text-sm hidden"></div>
                <div class="mt-8 text-center">
                    <button id="signupBtn" class="btn-primary btn-auth">Create account</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://192.168.1.2:3000/api/rest';
        document.getElementById('signupBtn').addEventListener('click', async () => {
            const inputs = document.querySelectorAll('.custom-input');
            const name     = inputs[0].value.trim();
            const email    = inputs[1].value.trim();
            const phone    = inputs[2].value.trim();
            const password = inputs[3].value;
            const errEl    = document.getElementById('signup-error');
            errEl.classList.add('hidden');

            if (!name || !email || !phone || !password) {
                errEl.textContent = 'All fields are required.';
                errEl.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, password, role: 'customer' })
                });
                const result = await response.json();
                if (response.ok && result.data) {
                    localStorage.setItem('token', result.data.token);
                    localStorage.setItem('user', JSON.stringify(result.data.user));
                    window.location.href = './welcome.html';
                } else {
                    errEl.textContent = result.error || 'Registration failed. Please try again.';
                    errEl.classList.remove('hidden');
                }
            } catch (err) {
                console.error('Error registering:', err);
                errEl.textContent = 'Network error. Please try again later.';
                errEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
