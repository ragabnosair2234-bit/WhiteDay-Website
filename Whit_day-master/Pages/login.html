<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Day - Wedding Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="font-sans antialiased">
        <div class="flex min-h-screen h-[100vh]">
            <div class="hidden md:block w-1/2 relative">
                <img src="../img/login-img.jpg" class="w-full h-full object-cover" alt="Couple">
            </div>
            <div class="w-full md:w-1/2 flex flex-col items-center justify-center bg-[#F5ECDF] overflow-hidden">
                <img src="../img/logo.png" class="mb-4 md:mb-6 logo" >
                <div class="w-full max-w-[95%] space-y-4 form">
                    <div class="custom-input-group">
                        <input type="email" id="email" placeholder="Email" class="custom-input">
                        <i class="far fa-envelope custom-input-icon"></i>
                    </div>
                    <div class="custom-input-group !mb-2">
                        <input type="password" id="password" placeholder="Password" class="custom-input">
                        <i class="fas fa-lock custom-input-icon"></i>
                    </div>
                    <div class="text-right mb-4">
                        <a href="#" class="font-serif text-black font-bold text-[18px] hover:underline">Forgot Password?</a>
                    </div>
                    <button id="loginBtn" class="btn-primary btn-auth mb-4 w-full text-center block">Login</button>

                    <div class="text-center mt-2">
                        <p class="font-serif text-[28px] text-black mb-4 leading-tight">Or<br>login with</p>
                        <div class="flex justify-center gap-4 items-center">
                            <span class="cursor-pointer hover:opacity-80 transition-opacity">
                                <svg width="40" height="40" viewBox="0 0 48 48">
                                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                                    <path fill="none" d="M0 0h48v48H0z"/>
                                </svg>
                            </span>
                            <span class="cursor-pointer hover:opacity-80 transition-opacity text-[#1877F2]">
                                <i class="fab fa-facebook text-[42px]"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    
        <script>
            async function doLogin() {
                const email    = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    alert('Please enter your email and password.');
                    return;
                }

                try {
                    const response = await fetch('http://192.168.1.2:3000/api/rest/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const result = await response.json();
                    if (response.ok && result.data) {
                        localStorage.setItem('token', result.data.token);
                        localStorage.setItem('user', JSON.stringify(result.data.user));
                        window.location.href = './welcome.html';
                    } else {
                        alert(result.error || 'Login failed');
                    }
                } catch (err) {
                    console.error('Error logging in:', err);
                    alert('Network error. Please try again later.');
                }
            }

            // Click handler
            document.getElementById('loginBtn').addEventListener('click', doLogin);

            // Enter key — fires on either input field
            ['email', 'password'].forEach(id => {
                document.getElementById(id).addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') doLogin();
                });
            });
        </script>
</body>
</html>
